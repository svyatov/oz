version: "2"

linters:
  enable:
    # Style & correctness
    - gocritic
    - gosec
    - errorlint
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
    - godot
    - nolintlint
    - errname
    - predeclared
    - dupword
    - goprintffuncname

    # Error handling
    - wrapcheck
    - nilerr
    - nilnil

    # Complexity
    - gocognit
    - gocyclo
    - funlen

    # Performance
    - perfsprint
    - bodyclose
    - durationcheck
    - mirror

    # Modern Go
    - modernize
    - intrange
    - copyloopvar
    - recvcheck
    - exhaustive

    # Function hygiene
    - nakedret
    - thelper
    - lll

  settings:
    gosec:
      excludes:
        - G204
        - G301
        - G304
        - G306
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    lll:
      line-length: 120
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15
