version: "2"

linters:
  enable:
    # Style & correctness
    - gocritic
    - gosec
    - errorlint
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace
    - godot
    - nolintlint
    - errname
    - predeclared
    - dupword
    - goprintffuncname

    # Error handling
    - wrapcheck
    - nilerr
    - nilnil

    # Complexity
    - gocognit
    - gocyclo
    - funlen

    # Performance
    - perfsprint
    - bodyclose
    - durationcheck
    - mirror

    # Modern Go
    - modernize
    - intrange
    - copyloopvar
    - recvcheck
    - exhaustive

    # Function hygiene
    - nakedret
    - thelper
    - lll

    # Robustness
    - musttag
    - forcetypeassert
    - fatcontext
    - wastedassign
    - nilnesserr

    # Readability & consistency
    - goconst
    - nestif
    - usestdlibvars
    - usetesting

    # Safety guards
    - asciicheck
    - gocheckcompilerdirectives
    - reassign
    - iface

  settings:
    gosec:
      excludes:
        - G204
        - G301
        - G304
        - G306
        - G602
        - G703
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    govet:
      enable-all: true
    goconst:
      min-occurrences: 3
    lll:
      line-length: 120
    funlen:
      lines: 60
      statements: 40
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst
      - path: _test\.go
        text: "fieldalignment:"
